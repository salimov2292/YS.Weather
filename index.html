<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Погода</title>
    <link rel="stylesheet" href="css/style.min.css" />
    <link rel="stylesheet" href="css/reset.css" />
  </head>
  <body>
    <section class="section">
      <div class="section-container">
        <div class="section-search">
          <div class="section-search__name">YS.Weather</div>
          <div class="section-search__icon">
            <img src="img/icon-search.svg" alt="Поиск" />
          </div>
        </div>
        <div class="section-wrap">
          <div class="section-main__menu">
            <div class="section-main__number">14°</div>
            <div class="section-main__img--weather-type">
              <img src="img/icon-rain.png" alt="Weather Type" />
            </div>
            <div class="section-main__img--favorite">
              <div class="section-main__name--favorite">YS.Weather</div>
              <img src="img/icon-heart.svg" alt="" />
            </div>
          </div>
          <!--  -->
          <div class="section-right__menu">
            <div class="section-right__title">Added Locations:</div>
            <div class="section-right__city">
              <ul>
                <li>Amur</li>
                <li>Samara</li>
                <li>Bali</li>
                <li>Dane</li>
                <li>Kilo</li>
                <li>Nur-Sultan</li>
              </ul>
            </div>
          </div>
        </div>
        <div class="section-tabs">
          <div class="section-tabs__item">Now</div>
          <div class="section-tabs__item">Details</div>
          <div class="section-tabs__item">Forecast</div>
        </div>
      </div>
    </section>
  </body>
</html>
